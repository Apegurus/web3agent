name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs on the same PR/branch when a new commit lands. Keeps
# rapid-iteration PRs from queueing redundant minutes against the runner pool.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Validate the published engine floor plus the current Active LTS.
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Pack
        run: pnpm pack

      - name: Pack create-web3agent
        run: pnpm pack
        working-directory: packages/create-web3agent

      - name: Verify tarball contents
        run: |
          TARBALL=$(ls web3agent-*.tgz)
          echo "Tarball: $TARBALL"
          tar -tf "$TARBALL" | grep -E "(dist/|WEB3_CONTEXT\.md|README\.md|package\.json)"

      - name: End-user install simulation
        run: |
          TARBALL=$(ls web3agent-*.tgz)
          node tests/e2e/package-install-smoke.mjs "$PWD/$TARBALL"

      - name: Security audit
        run: pnpm audit --prod --audit-level high
