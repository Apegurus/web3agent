name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs on the same PR/branch when a new commit lands. Keeps
# rapid-iteration PRs from queueing redundant minutes against the runner pool.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    strategy:
      fail-fast: false
      matrix:
        # ubuntu is the primary target; macos catches POSIX-specific code paths
        # (mode 0o700 dir-permission repair, pack-mutex Atomics.wait + O_EXCL
        # lockfile, fs.realpathSync symlink semantics in create-web3agent) that
        # would otherwise only be exercised on developer machines.
        os: [ubuntu-latest, macos-latest]
        # Node 24.x is the current Active LTS (since 2025-10). The floor is
        # engines.node ">=22" in both publishable packages, so Node 24 is
        # in-bounds for users while picking up upstream perf and security
        # fixes that 22 won't backport.
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Pack
        run: pnpm pack

      - name: Pack create-web3agent
        run: pnpm pack
        working-directory: packages/create-web3agent

      - name: Verify tarball contents
        run: |
          TARBALL=$(ls web3agent-*.tgz)
          echo "Tarball: $TARBALL"
          tar -tf "$TARBALL" | grep -E "(dist/|WEB3_CONTEXT\.md|README\.md|package\.json)"

      - name: End-user install simulation
        run: |
          TARBALL=$(ls web3agent-*.tgz)
          node tests/e2e/package-install-smoke.mjs "$PWD/$TARBALL"

      - name: Security audit (non-blocking)
        # pnpm audit's exit code is sensitive to transient advisory churn;
        # surface findings as warnings so CI doesn't flap on upstream changes,
        # while still showing the report in the run summary.
        run: pnpm audit --prod || true
        if: matrix.os == 'ubuntu-latest'
